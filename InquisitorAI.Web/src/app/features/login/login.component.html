<div class="flex min-h-[60vh] items-center justify-center px-4">
  <div class="w-full max-w-sm rounded-2xl border border-gray-200 bg-white p-8 shadow-lg">
    <h1 class="text-center text-2xl font-bold text-gray-900">Sign In</h1>
    <p class="mt-2 text-center text-sm text-gray-600">Choose your preferred provider to continue.</p>
    <div class="mt-8 flex flex-col gap-3">
      <button (click)="login('google')"
              class="flex w-full items-center justify-center gap-3 rounded-lg border border-gray-300 bg-white px-4 py-3 text-sm font-medium text-gray-700 shadow-sm transition hover:bg-gray-50">
        Sign in with Google
      </button>
      <button (click)="login('github')"
              class="flex w-full items-center justify-center gap-3 rounded-lg border border-gray-300 bg-white px-4 py-3 text-sm font-medium text-gray-700 shadow-sm transition hover:bg-gray-50">
        Sign in with GitHub
      </button>
      <button (click)="login('linkedin')"
              class="flex w-full items-center justify-center gap-3 rounded-lg border border-gray-300 bg-white px-4 py-3 text-sm font-medium text-gray-700 shadow-sm transition hover:bg-gray-50">
        Sign in with LinkedIn
      </button>
    </div>
  </div>
</div>
