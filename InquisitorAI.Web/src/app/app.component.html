<nav class="border-b border-gray-200 bg-white">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
    <a routerLink="/" class="text-xl font-bold text-indigo-600">Inquisitor AI</a>

    <div class="flex items-center gap-4">
      @if (authStore.isAuthenticated()) {
        <a routerLink="/dashboard" routerLinkActive="text-indigo-600" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Dashboard</a>
        <a routerLink="/questionnaires" routerLinkActive="text-indigo-600" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Questionnaires</a>
        <a routerLink="/sessions" routerLinkActive="text-indigo-600" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Sessions</a>
        <a routerLink="/leaderboard" routerLinkActive="text-indigo-600" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Leaderboard</a>
        <a routerLink="/profile" routerLinkActive="text-indigo-600" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Profile</a>

        <div class="flex items-center gap-2">
          @if (authStore.currentUser()?.avatarUrl) {
            <img [src]="authStore.currentUser()!.avatarUrl" alt="Avatar" class="h-8 w-8 rounded-full" />
          }
          <span class="text-sm font-medium text-gray-700">{{ authStore.currentUser()?.displayName }}</span>
          <button (click)="authStore.logout()" class="rounded-md bg-gray-100 px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-200">
            Logout
          </button>
        </div>
      } @else {
        <a routerLink="/leaderboard" routerLinkActive="text-indigo-600" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Leaderboard</a>
        <a routerLink="/login" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
          Login
        </a>
      }
    </div>
  </div>
</nav>

<main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  <router-outlet />
</main>
